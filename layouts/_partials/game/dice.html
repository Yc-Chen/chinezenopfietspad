{{/* Dice roll + end-game controls, wrapped in a sidebar panel. */}}
<div class="gb__panel gb__dice-panel">
  <div class="gb__panel-title">{{ i18n "dice_title" }}</div>
  <div class="gb__controls" role="group" aria-label="{{ i18n "controls_label" }}">
    <button type="button" id="gb-roll" class="gb__roll">
      <span class="gb__roll-icon" aria-hidden="true">🎲</span>
      <span class="gb__roll-label">{{ i18n "roll_label" }}</span>
      <span class="gb__roll-result" id="gb-roll-result" aria-live="polite"></span>
    </button>
    <button type="button" id="gb-end" class="gb__end">
      {{ i18n "end_game" }}
    </button>
  </div>
</div>
