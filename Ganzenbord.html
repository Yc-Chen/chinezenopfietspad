<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ganzenbord — Dutch Fun Facts</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Lora:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #f5efe4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      background-image:
        radial-gradient(circle at 15% 15%, rgba(26,82,148,0.06) 0%, transparent 50%),
        radial-gradient(circle at 85% 85%, rgba(230,98,0,0.06) 0%, transparent 50%);
    }
    h1 {
      font-family: 'Lora', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      color: #1a3d6b;
      letter-spacing: -0.5px;
      text-align: center;
    }
    h1 span { color: #e06200; font-style: italic; }
    .subtitle {
      font-size: 0.85rem;
      color: #888;
      text-align: center;
      margin-top: 4px;
      margin-bottom: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .layout {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 1100px;
      width: 100%;
    }
    /* BOARD */
    .board-wrap {
      background: #fef9f0;
      border: 3px solid #1a3d6b;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 8px 32px rgba(26,61,107,0.13);
      position: relative;
    }
    .board-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(6, 1fr);
      gap: 5px;
    }
    /* TILE */
    .tile {
      width: 84px;
      height: 84px;
      border-radius: 10px;
      border: 2px solid rgba(26,61,107,0.18);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      transition: transform 0.15s, box-shadow 0.15s;
      user-select: none;
      overflow: hidden;
      background: #fffef8;
    }
    .tile:hover { transform: scale(1.06); box-shadow: 0 4px 18px rgba(0,0,0,0.14); z-index: 2; }
    .tile.start  { background: #e8f4e8; border-color: #5a9a5a; }
    .tile.finish { background: #fff0cc; border-color: #e06200; }
    .tile.goose  { background: #f0faf0; border-color: #7bc47b; }
    .tile.bridge { background: #e8f0fc; border-color: #4a7ec8; }
    .tile.inn    { background: #fdf4e8; border-color: #c89040; }
    .tile.well   { background: #e8f4fc; border-color: #4a9fc8; }
    .tile.death  { background: #fce8e8; border-color: #c84a4a; }
    .tile-num {
      position: absolute;
      top: 4px; left: 6px;
      font-size: 0.6rem;
      font-weight: 800;
      color: rgba(26,61,107,0.45);
      line-height: 1;
    }
    .tile-emoji { font-size: 1.6rem; line-height: 1; }
    .tile-label {
      font-size: 0.58rem;
      font-weight: 700;
      color: #1a3d6b;
      text-align: center;
      padding: 0 4px;
      margin-top: 3px;
      line-height: 1.2;
    }
    .tile.finish .tile-label { color: #e06200; }
    /* TOKENS */
    .tokens-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .token {
      position: absolute;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2.5px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      font-weight: 900;
      color: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
      transition: left 0.5s cubic-bezier(.34,1.4,.64,1), top 0.5s cubic-bezier(.34,1.4,.64,1);
      pointer-events: none;
      z-index: 10;
    }
    /* SIDEBAR */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 220px;
      min-width: 200px;
    }
    .panel {
      background: #fef9f0;
      border: 2px solid rgba(26,61,107,0.15);
      border-radius: 12px;
      padding: 14px 16px;
    }
    .panel-title {
      font-size: 0.65rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #1a3d6b;
      opacity: 0.6;
      margin-bottom: 10px;
    }
    .player-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 8px;
      border-radius: 8px;
      margin-bottom: 6px;
      transition: background 0.2s;
    }
    .player-row.active {
      background: rgba(26,61,107,0.07);
    }
    .player-dot {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 900; color: white;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.18);
    }
    .player-info { flex: 1; }
    .player-name { font-size: 0.82rem; font-weight: 800; color: #1a3d6b; }
    .player-pos  { font-size: 0.7rem; color: #888; font-weight: 600; }
    .player-status { font-size: 0.68rem; color: #e06200; font-weight: 700; margin-top: 1px; }
    /* DICE */
    .dice-section { text-align: center; }
    .dice-display {
      width: 52px; height: 52px;
      background: white;
      border: 2px solid rgba(26,61,107,0.2);

    }

    .log-list li {

    .legend { display: flex; flex-wrap: wrap; gap: 5px; }
    .legend-item {

    }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(10,25,50,0.55);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;

    }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .modal {
      background: #fef9f0;
      border-radius: 18px;

      max-width: 420px;

    .modal-emoji { font-size: 3rem; display: block; text-align: center; margin-bottom: 10px; }
    .modal-tile-num {
      font-size: 0.65rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.5px;

      text-align: center;

      font-family: 'Lora', serif;
      font-size: 1.4rem;

      margin-bottom: 14px;

      color: white;

    /* WIN */

    .win-banner p { font-size: 0.9rem; opacity: 0.85; margin-bottom: 16px; }
    .win-btn {
      background: #e06200;
      color: white;
      border: none;
      border-radius: 9px;
      padding: 10px 24px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.88rem;
      font-weight: 800;
      cursor: pointer;

    .turn-indicator {

      .board-grid { gap: 3px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── TILE DATA ─────────────────────────────────────────────────────────────────
const TILES = [
  { id:1,  type:'start',  emoji:'✈️',  title:'Schiphol Airport',    fact:'Welcome! You\'ve just landed at Schiphol Airport — one of Europe\'s busiest. Fun fact: it was built on the bottom of a drained lake, sitting 4 metres below sea level. Please do not worry about this.' },
  { id:2,  type:'normal', emoji:'🚲',  title:'Dutch Cycling',        fact:'There are more bicycles (23 million) than people (17 million) in the Netherlands. The roads are completely flat. There are no excuses for not cycling. None.' },
  { id:3,  type:'normal', emoji:'🍫',  title:'Hagelslag',            fact:'Dutch people eat chocolate sprinkles on buttered bread for breakfast. This is called hagelslag. It is not a dessert. It is breakfast. Foreigners require a moment to process this.' },
  { id:4,  type:'goose',  emoji:'🪿',  title:'De Ganzensprong!',     fact:'You landed on a Goose tile! The goose honks — move forward the same number again! In the original game, geese appeared on tiles 5, 9, 14, 18, 23, 27…', special:{action:'goose'} },
  { id:5,  type:'normal', emoji:'💬',  title:'Dutch Directness',     fact:'"Your presentation was fine, but honestly, slides 3 through 7 were a bit weak" — a Dutch colleague, being kind. Dutch directness is a cultural superpower. Do not take it personally. They are trying to help.' },
  { id:6,  type:'normal', emoji:'🧇',  title:'Stroopwafel',          fact:'Place a stroopwafel on top of your hot coffee cup. Wait 90 seconds. The syrup in the middle melts. This is peak Dutch engineering and one of the few things all foreigners immediately love.' },
  { id:7,  type:'normal', emoji:'📏',  title:'Tallest People',       fact:'Dutch men average 182 cm — the tallest in the world. Dutch doorframes are… not always adjusted accordingly. Foreigners walk around fine. Very tall foreigners bump their heads constantly.' },
  { id:8,  type:'bridge', emoji:'🌉',  title:'The Bridge',           fact:'Rotterdam has more bridges than Venice! In fact, the Netherlands has over 30,000 bridges. Jump ahead to tile 14!', special:{action:'jump', target:14} },
  { id:9,  type:'normal', emoji:'🍬',  title:'Drop (Licorice)',      fact:'Dutch black licorice (drop) is aggressively salty and strong. The Dutch eat enormous quantities of it and offer it to foreigners with great enthusiasm. The foreigner\'s face is always priceless.' },
  { id:10, type:'normal', emoji:'🕯️', title:'Gezelligheid',          fact:'"Gezelligheid" — cosiness, warmth, togetherness — has no direct English translation. It is not just an aesthetic, it is a social obligation. If the vibe is right, you are verplicht gezellig.' },
  { id:11, type:'normal', emoji:'🗺️', title:'Holland ≠ Netherlands', fact:'Calling the whole country "Holland" is like calling the UK "England." Holland is just 2 provinces in the west. The Dutch will correct you — pleasantly the first time, less so the tenth.' },
  { id:12, type:'goose',  emoji:'🪿',  title:'De Ganzensprong!',     fact:'Another Goose! Move forward again!', special:{action:'goose'} },
  { id:13, type:'normal', emoji:'🟠',  title:'Koningsdag',           fact:'On King\'s Day (April 27) the entire country turns orange. Streets become flea markets. Canal boats are packed. Everyone wears orange. Foreigners arrive confused, leave converts.' },
  { id:14, type:'normal', emoji:'🍟',  title:'Patat Oorlog',         fact:'"Patatje oorlog" means "war fries" — fries with mayonnaise, peanut sauce, AND raw onions. This chaotic combination is available at every snack bar. It\'s deeply Dutch and absolutely delicious.' },
  { id:15, type:'inn',    emoji:'🍺',  title:'Brown Café',           fact:'You\'re stuck in a bruine kroeg! Miss one turn. These cozy pubs are named for centuries of tobacco-stained walls. The beer is always cold, the conversation is always long.', special:{action:'miss', turns:1} },
  { id:16, type:'normal', emoji:'🌬️', title:'Windmills',            fact:'Windmills were mainly used to pump water OUT of the land, not to grind grain. The Dutch literally engineered their country into existence by draining the sea. This is treated as normal.' },
  { id:17, type:'normal', emoji:'🌷',  title:'Tulips from Turkey',   fact:'Tulips originally came from Central Asia and Turkey. The Dutch obtained bulbs in the 1500s and marketed them so aggressively that the world now considers tulips Dutch. Respect the hustle.' },
  { id:18, type:'goose',  emoji:'🪿',  title:'De Ganzensprong!',     fact:'Goose tile again! Keep going!', special:{action:'goose'} },
  { id:19, type:'normal', emoji:'💶',  title:'Going Dutch',          fact:'"Going Dutch" means everyone pays their own share. This is not rudeness — it\'s equality. Dating in the Netherlands involves careful mental arithmetic. Bring exact change.' },
  { id:20, type:'normal', emoji:'🎅',  title:'Sinterklaas',          fact:'The Dutch gift-giving holiday features Sinterklaas, who arrives by BOAT from Spain in November, rides a white horse over rooftops, and leaves gifts in shoes. It\'s chaotic and wonderful and very Dutch.' },
  { id:21, type:'normal', emoji:'🐟',  title:'Raw Herring',          fact:'Haring is eaten raw, held above your head, dangled into your open mouth, with raw onions. Street stalls sell it everywhere from June. Watching a tourist try haring is a beloved national sport.' },
  { id:22, type:'well',   emoji:'🪣',  title:'Stuck in the Well!',   fact:'You\'ve fallen in! Wait here until another player lands on this tile or passes to rescue you. Fun fact: the Netherlands\' highest "point" is only 322 metres. It\'s more of a gentle hill.', special:{action:'wait'} },
  { id:23, type:'normal', emoji:'🏠',  title:'Leaning Canal Houses', fact:'Amsterdam\'s canal houses lean FORWARD on purpose. The stairs inside are impossibly steep (to save space), so all furniture is hoisted through the windows. The iron hooks are still visible on the facades.' },
  { id:24, type:'normal', emoji:'📈',  title:'Dutch Invented Stocks', fact:'The Dutch East India Company (VOC) was the world\'s first publicly traded company in 1602. The Amsterdam stock exchange is the oldest in the world. Capitalism has a Dutch accent.' },
  { id:25, type:'normal', emoji:'🌧️', title:'Rain? Just Cycle.',    fact:'It rains in the Netherlands roughly 130 days a year. Dutch people cycle in the rain without discussion. Umbrella in one hand, phone in the other, full speed. Tourists wobble. The Dutch do not wobble.' },
  { id:26, type:'goose',  emoji:'🪿',  title:'De Ganzensprong!',     fact:'Goose! Fly forward!', special:{action:'goose'} },
  { id:27, type:'normal', emoji:'🥞',  title:'Poffertjes',           fact:'Tiny, fluffy buckwheat pancakes cooked in a special cast-iron pan, served with butter and powdered sugar. One of the few Dutch foods that requires zero explanation or convincing for foreigners. Universally adored.' },
  { id:28, type:'normal', emoji:'🧀',  title:'Gouda & Edam',        fact:'Gouda and Edam are actual towns in the Netherlands. The cheese markets still happen, with men in traditional white hats carrying large wooden trays of cheese. It\'s completely authentic and also very photogenic.' },
  { id:29, type:'normal', emoji:'🌊',  title:'Below Sea Level',      fact:'About 26% of the Netherlands is below sea level. The country exists because of a sophisticated system of dikes, pumps, and sluices maintained around the clock. The Dutch are remarkably calm about this.' },
  { id:30, type:'normal', emoji:'⚓',  title:'Rotterdam Port',       fact:'Rotterdam has the largest port in Europe. For centuries it was THE gateway into the continent. The Dutch are quietly but intensely proud of this, and will mention it in approximately 40% of conversations.' },
  { id:31, type:'goose',  emoji:'🪿',  title:'De Ganzensprong!',     fact:'Final Goose! One last push!', special:{action:'goose'} },
  { id:32, type:'normal', emoji:'🎨',  title:'Dutch Golden Age',     fact:'In the 1600s, the tiny Netherlands was arguably the richest, most powerful country on Earth. Rembrandt, Vermeer, Spinoza — all Dutch, all flourishing simultaneously. An extraordinary moment in a small, wet country.' },
  { id:33, type:'normal', emoji:'♻️',  title:'Dutch Recycling',      fact:'The Netherlands consistently ranks among the world\'s top recyclers. There are separate bins for paper, glass, plastic, organic waste, and small chemical waste. Put the wrong thing in the wrong bin. They will know.' },
  { id:34, type:'death',  emoji:'💧',  title:'De Dijk Breekt!',      fact:'The dike broke! Go back to the start! (In real life, Dutch water engineers would fix this within hours. They are very, very good at this. They have had practice.)', special:{action:'goto', target:1} },
  { id:35, type:'normal', emoji:'🍪',  title:'Speculaas',            fact:'Speculaas spiced cookies are windmill-shaped, sold everywhere from late November. You may recognise the flavour — it\'s basically Biscoff/Lotus cookies, which are speculaas that escaped to Belgium.' },
  { id:36, type:'finish', emoji:'🏆',  title:'Amsterdam!',           fact:'You\'ve arrived! You now know more about the Netherlands than most people who have actually been there. The Dutch are reluctantly impressed. Gefeliciteerd — congratulations!' },
];

const TILE_MAP = Object.fromEntries(TILES.map(t => [t.id, t]));

const DICE_FACES = ['⚀','⚁','⚂','⚃','⚄','⚅'];

const PLAYERS = [
  { id:0, name:'Player 1', color:'#e06200', short:'1' },
  { id:1, name:'Player 2', color:'#1a3d6b', short:'2' },
];

// ── BOARD LAYOUT ──────────────────────────────────────────────────────────────
function getTileGridPos(id) {
  const idx = id - 1;
  const rowFromBottom = Math.floor(idx / 6);
  const posInRow = idx % 6;
  const col = rowFromBottom % 2 === 0 ? posInRow : (5 - posInRow);
  const row = 5 - rowFromBottom;
  return { row, col };
}

// Build a 6x6 grid
function buildGrid() {
  const grid = Array.from({length:6}, () => Array(6).fill(null));
  TILES.forEach(t => {
    const {row, col} = getTileGridPos(t.id);
    grid[row][col] = t;
  });
  return grid;
}

const GRID = buildGrid();

// ── GAME LOGIC ────────────────────────────────────────────────────────────────
function initState() {
  return {
    positions: [1, 1],
    currentPlayer: 0,
    rolling: false,
    diceValue: null,
    diceAnim: false,
    modal: null,       // { tile, message, onClose }
    log: ['Game started! Player 1 goes first.'],
    waitingPlayer: -1, // -1 = none
    skips: [0, 0],
    winner: null,
  };
}

// ── COMPONENTS ────────────────────────────────────────────────────────────────

function TileCell({ tile, players }) {
  const playersHere = players.filter((_, i) => i >= 0);
  return (
    <div className={`tile ${tile.type}`} title={tile.title}>
      <span className="tile-num">{tile.id}</span>
      <span className="tile-emoji">{tile.emoji}</span>
      <span className="tile-label">{tile.title}</span>
    </div>
  );
}

function Board({ positions, boardRef }) {
  return (
    <div className="board-wrap" ref={boardRef}>
      <div className="board-grid">
        {GRID.flat().map((tile, i) =>
          tile ? <TileCell key={tile.id} tile={tile} players={[]} /> : <div key={i} />
        )}
      </div>
      {/* tokens rendered as absolute overlay after mount */}
    </div>
  );
}

function TokenOverlay({ positions, boardRef, boardMounted }) {
  const [tokenPositions, setTokenPositions] = useState([{top:0,left:0},{top:0,left:0}]);

  useEffect(() => {
    if (!boardRef.current || !boardMounted) return;
    const board = boardRef.current;
    const grid = board.querySelector('.board-grid');
    if (!grid) return;
    const cells = grid.children;
    const gridRect = board.getBoundingClientRect();

    const newPos = positions.map((pos, pi) => {
      const tile = TILE_MAP[pos];
      const { row, col } = getTileGridPos(tile.id);
      const cellIdx = row * 6 + col;
      const cell = cells[cellIdx];
      if (!cell) return { top: 0, left: 0 };
      const cellRect = cell.getBoundingClientRect();
      const offsetX = pi === 0 ? 10 : 38;
      const offsetY = pi === 0 ? 10 : 10;
      return {
        top: cellRect.top - gridRect.top + board.scrollTop + offsetY,
        left: cellRect.left - gridRect.left + board.scrollLeft + offsetX,
      };
    });
    setTokenPositions(newPos);
  }, [positions, boardMounted]);

  return (
    <div className="tokens-layer">
      {PLAYERS.map((p, i) => (
        <div key={p.id} className="token" style={{
          top: tokenPositions[i].top,
          left: tokenPositions[i].left,
          background: p.color,
        }}>
          {p.short}
        </div>
      ))}
    </div>
  );
}

function Modal({ modal, onClose }) {
  if (!modal) return null;
  const { tile, extraMsg } = modal;
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <span className="modal-emoji">{tile.emoji}</span>
        <div className="modal-tile-num">Tile {tile.id}</div>
        <div className="modal-title">{tile.title}</div>
        <p className="modal-fact">{tile.fact}</p>
        {extraMsg && <div className="modal-special">{extraMsg}</div>}
        <button className="modal-btn" onClick={onClose}>
          {tile.type === 'finish' ? '🎉 Gefeliciteerd!' : 'Lekker! Continue →'}
        </button>
      </div>
    </div>
  );
}

function WinScreen({ winner, onRestart }) {
  const p = PLAYERS[winner];
  return (
    <div className="modal-overlay">
      <div className="modal win-banner" style={{background:'linear-gradient(135deg,#1a3d6b,#2a5fa0)', border:'3px solid #e06200'}}>
        <div style={{fontSize:'3rem', marginBottom:'10px'}}>🏆</div>
        <h2 style={{fontFamily:'Lora,serif', fontSize:'2rem', color:'white', marginBottom:'8px'}}>{p.name} wins!</h2>
        <p style={{color:'rgba(255,255,255,0.85)', marginBottom:'16px', fontStyle:'italic'}}>
          Gefeliciteerd! You've made it to Amsterdam and learned {35} Dutch fun facts along the way.
        </p>
        <button className="win-btn" onClick={onRestart}>Play Again</button>
      </div>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [state, setState] = useState(() => {
    const saved = localStorage.getItem('ganzenbord_state');
    if (saved) try { return JSON.parse(saved); } catch(e) {}
    return initState();
  });

  const boardRef = useRef(null);
  const [boardMounted, setBoardMounted] = useState(false);

  useEffect(() => {
    setBoardMounted(true);
  }, []);

  useEffect(() => {
    localStorage.setItem('ganzenbord_state', JSON.stringify(state));
  }, [state]);

  function addLog(msg) {
    setState(s => ({ ...s, log: [msg, ...s.log].slice(0, 20) }));
  }

  function rollDice() {
    const { currentPlayer, skips, waitingPlayer, positions } = state;
    const p = PLAYERS[currentPlayer];

    if (skips[currentPlayer] > 0) {
      setState(s => {
        const newSkips = [...s.skips];
        newSkips[currentPlayer] -= 1;
        return {
          ...s,
          skips: newSkips,
          currentPlayer: 1 - s.currentPlayer,
          log: [`${p.name} is stuck at the inn — skipping turn!`, ...s.log].slice(0,20),
        };
      });
      return;
    }

    if (waitingPlayer === currentPlayer) {
      setState(s => ({
        ...s,
        log: [`${p.name} is stuck in the well — needs rescuing!`, ...s.log].slice(0,20),
        currentPlayer: 1 - s.currentPlayer,
      }));
      return;
    }

    // Animate dice
    setState(s => ({ ...s, diceAnim: true }));
    setTimeout(() => {
      const roll = Math.floor(Math.random() * 6) + 1;
      doMove(roll);
    }, 380);
  }

  function doMove(roll, fromPos, fromPlayer) {
    setState(prevState => {
      const cp = fromPlayer !== undefined ? fromPlayer : prevState.currentPlayer;
      const startPos = fromPos !== undefined ? fromPos : prevState.positions[cp];
      const p = PLAYERS[cp];
      let newPos = Math.min(startPos + roll, 36);
      const tile = TILE_MAP[newPos];
      let extraMsg = null;
      let newSkips = [...prevState.skips];
      let newWaiting = prevState.waitingPlayer;
      let newPositions = [...prevState.positions];
      newPositions[cp] = newPos;
      let winner = null;
      let logMsg = `${p.name} rolled ${roll} → tile ${newPos} (${tile.title})`;
      let newCurrentPlayer = prevState.currentPlayer;
      let specialAction = null;

      if (tile.type === 'finish') {
        winner = cp;
        logMsg = `🏆 ${p.name} wins!`;
      } else if (tile.special) {
        const { action, target, turns } = tile.special;
        if (action === 'goose') {
          extraMsg = `🪿 Goose! Move forward ${roll} more!`;
          logMsg += ` — GOOSE! Move again!`;
          specialAction = { type: 'goose', roll, pos: newPos, player: cp };
        } else if (action === 'jump') {
          newPos = target;
          newPositions[cp] = target;
          extraMsg = `→ Jump to tile ${target}!`;
          logMsg += ` — jumped to tile ${target}!`;
        } else if (action === 'miss') {
          newSkips[cp] += (turns || 1);
          extraMsg = `Miss ${turns || 1} turn(s)!`;
          logMsg += ` — stuck! Miss ${turns} turn.`;
          newCurrentPlayer = 1 - cp;
        } else if (action === 'wait') {
          newWaiting = cp;
          extraMsg = `Stuck in the well! Wait to be rescued.`;
          logMsg += ` — stuck in the well!`;
          newCurrentPlayer = 1 - cp;
        } else if (action === 'goto') {
          newPositions[cp] = target;
          newPos = target;
          extraMsg = `💧 Dike broke! Go back to start!`;
          logMsg += ` — sent back to start!`;
        }
      }

      // If other player is in the well and we land on/pass their tile — rescue
      const otherPlayer = 1 - cp;
      if (newWaiting === otherPlayer && tile.type !== 'well') {
        newWaiting = -1;
        logMsg += ` — rescued ${PLAYERS[otherPlayer].name} from the well!`;
      }

      // Advance turn (unless goose — handled after modal)
      if (!specialAction && tile.type !== 'miss' && tile.type !== 'well' && !winner) {
        newCurrentPlayer = 1 - cp;
      }
      if (winner !== null) newCurrentPlayer = cp;

      return {
        ...prevState,
        positions: newPositions,
        diceValue: roll,
        diceAnim: false,
        skips: newSkips,
        waitingPlayer: newWaiting,
        winner,
        currentPlayer: newCurrentPlayer,
        log: [logMsg, ...prevState.log].slice(0, 20),
        modal: {
          tile: TILE_MAP[newPos],
          extraMsg,
          onCloseAction: specialAction,
          donePlayer: cp,
        },
      };
    });
  }

  function handleModalClose() {
    const { modal } = state;
    if (!modal) return;
    const { onCloseAction, donePlayer } = modal;
    if (onCloseAction && onCloseAction.type === 'goose') {
      setState(s => ({ ...s, modal: null }));
      setTimeout(() => doMove(onCloseAction.roll, onCloseAction.pos, onCloseAction.player), 200);
    } else {
      setState(s => ({
        ...s,
        modal: null,
        currentPlayer: modal.tile.type === 'finish' ? s.currentPlayer : (
          // already set in doMove
          s.currentPlayer
        ),
      }));
    }
  }

  function restart() {
    setState(initState());
  }

  const { positions, currentPlayer, diceValue, diceAnim, modal, log, winner, skips, waitingPlayer } = state;

  const canRoll = !modal && !winner;

  return (
    <div>
      <h1>Ganzenbord <span>Nederlands</span></h1>
      <div className="subtitle">A journey through the Netherlands — for curious foreigners</div>

      <div className="layout">
        {/* BOARD */}
        <div style={{position:'relative'}}>
          <Board positions={positions} boardRef={boardRef} />
          {boardMounted && (
            <TokenOverlay positions={positions} boardRef={boardRef} boardMounted={boardMounted} />
          )}
        </div>

        {/* SIDEBAR */}
        <div className="sidebar">

          {/* PLAYERS */}
          <div className="panel">
            <div className="panel-title">Players</div>
            {PLAYERS.map((p, i) => (
              <div key={p.id} className={`player-row ${currentPlayer === i && !winner ? 'active' : ''}`}>
                <div className="player-dot" style={{background: p.color}}>{p.short}</div>
                <div className="player-info">
                  <div className="player-name">{p.name}</div>
                  <div className="player-pos">Tile {positions[i]} — {TILE_MAP[positions[i]].title}</div>
                  {skips[i] > 0 && <div className="player-status">⏳ Skipping {skips[i]} turn(s)</div>}
                  {waitingPlayer === i && <div className="player-status">🪣 Stuck in the well!</div>}
                </div>
              </div>
            ))}
            {!winner && (
              <div className="turn-indicator">
                {PLAYERS[currentPlayer].name}'s turn
              </div>
            )}
          </div>

          {/* DICE */}
          <div className="panel dice-section">
            <div className="panel-title">Dice</div>
            <div className={`dice-display ${diceAnim ? 'rolling' : ''}`}>
              {diceValue ? DICE_FACES[diceValue - 1] : '🎲'}
            </div>
            <button
              className="roll-btn"
              onClick={rollDice}
              disabled={!canRoll}
            >
              {skips[currentPlayer] > 0
                ? `Skip turn (${skips[currentPlayer]} left)`
                : waitingPlayer === currentPlayer
                ? 'Stuck in well…'
                : `Roll — ${PLAYERS[currentPlayer].name}`}
            </button>
          </div>

          {/* LEGEND */}
          <div className="panel">
            <div className="panel-title">Tile types</div>
            <div className="legend">
              <div className="legend-item"><div className="legend-dot" style={{background:'#7bc47b', border:'1px solid #5a9a5a'}}></div>Goose — move again</div>
              <div className="legend-item"><div className="legend-dot" style={{background:'#4a7ec8', border:'1px solid #2a5aa8'}}></div>Bridge — jump forward</div>
              <div className="legend-item"><div className="legend-dot" style={{background:'#c89040', border:'1px solid #a87020'}}></div>Inn — miss a turn</div>
              <div className="legend-item"><div className="legend-dot" style={{background:'#4a9fc8', border:'1px solid #2a7fa8'}}></div>Well — get stuck</div>
              <div className="legend-item"><div className="legend-dot" style={{background:'#c84a4a', border:'1px solid #a82a2a'}}></div>Dike Break — restart</div>
            </div>
          </div>

          {/* LOG */}
          <div className="panel">
            <div className="panel-title">Game log</div>
            <ul className="log-list">
              {log.map((entry, i) => <li key={i}>{entry}</li>)}
            </ul>
          </div>

          {/* RESTART */}
          <button
            style={{
              background:'transparent', border:'2px solid rgba(26,61,107,0.2)',
              borderRadius:'8px', padding:'8px', cursor:'pointer',
              fontFamily:'Nunito,sans-serif', fontSize:'0.75rem', fontWeight:700,
              color:'rgba(26,61,107,0.5)'
            }}
            onClick={restart}
          >↺ Restart game</button>
        </div>
      </div>

      {/* MODAL */}
      {modal && !winner && <Modal modal={modal} onClose={handleModalClose} />}

      {/* WIN */}
      {winner !== null && <WinScreen winner={winner} onRestart={restart} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
