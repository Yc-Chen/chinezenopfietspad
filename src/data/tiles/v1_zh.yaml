"37":
  status: filled
  title: 空调不是标配
  body: 一到热浪来袭，荷兰的房子就变成砖砌的烤箱。空调根本不是标配——大多数房子和楼房的设计是为了把热量留在屋里，而不是挡在外面。而如果你住在公寓里，业主委员会（VVE）通常也不允许你安装。托儿所和学校的楼里同样没有空调，于是干脆放假一天。官方的"降温系统"是：晚上开窗，白天拉窗帘，再买一台小风扇，把热空气温柔地搅一搅。
  icon: fa fa-fan

"38":
  status: filled
  title: 日程提前半年排满
  body: 当你还在想着下周做什么时，你的荷兰朋友们早已把未来六个月的行程安排好了。
  icon: fa fa-calendar

"39":
  status: reserved
  title: "第39格｜自行车路怒"
  body: 荷兰人骑自行车时特别容易发火，哪怕自己骑错了方向。如果你骑得不够快，或者不该在那条路上出现，你肯定会被"教育"一番。

"40":
  status: filled
  title: 40度，全国融化
  body: 荷兰的高温纪录是40.7°C。气温一旦飙升，火车减速，全国上下一致认为"实在太热了"。然而依旧没有空调——于是一条湿毛巾和那台小风扇，就成了全国的降温系统。
  icon: fa fa-temperature-high

