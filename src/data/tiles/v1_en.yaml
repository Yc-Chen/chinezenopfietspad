"37":
  status: filled
  title: Airco is not standard here
  body: During a heat wave Dutch houses turn into brick ovens. Air conditioning simply isn't the default; most houses and buildings are built to keep heat in, not out. And if you live in an apartment, the VVE (homeowners' association) often won't let you install one anyway. Daycares and schools, whose buildings have no airco either, just call the day off. The official cooling system; open a window at night, close the curtains by day, and buy a tiny ventilator that politely stirs the hot air around.
  icon: fa fa-fan

"38":
  status: filled
  title: People fill up their agenda half a year in advance
  body: While you are still thinking about what to do next week, your Dutch friends have already filled up their agenda for the next 6 months.
  icon: fa fa-calendar

"39":
  status: reserved
  title: "Tile 39 | Bicycle road rage"
  body: Dutch people get aggressive when they are on a bicycle, even in the wrong direction. You will hear about it if you are not cycling fast enough, or if you are not supposed to be there.

"40":
  status: filled
  title: 40 degrees and the country melts
  body: The Dutch heat record is 40.7°C. When the thermometer climbs, trains slow down and the whole nation agrees it is way too hot. There is still no airco, so a wet tea towel and that little ventilator become the national cooling system.
  icon: fa fa-temperature-high

