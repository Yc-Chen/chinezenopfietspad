  body: "Zelfs bij fastfood, kort nadat je je eten krijgt, komt de ober altijd langs om te vragen: \"Heeft alles gesmaakt?\" Je hoort dan je bestek neer te leggen, te glimlachen en \"Ja, lekker!\" te zeggen — ook als je haast hebt."
