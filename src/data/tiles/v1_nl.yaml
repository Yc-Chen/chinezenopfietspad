  title: Nederlands feestje
  body: Op Nederlandse feestjes zitten mensen gewoon in een kring en praten, en dat is het. Geen muziek, geen eten (nou ja, borrelhapjes), geen spelletjes, geen activiteiten.
  icon: fa fa-people-group

