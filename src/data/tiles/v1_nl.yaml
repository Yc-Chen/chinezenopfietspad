  mechanic_label: De gevangenis
  title: Treinen
  body: |
    Achter de tralies.
    Het is te warm (40°C) dus de treinen rijden niet.
    Overigens rijden Chinese hogesnelheidstreinen het hele jaar door, van -20°C tot 40°C, en ze zijn ontworpen om onder extreme weersomstandigheden te functioneren.
    Wacht tot een andere speler je aflost.

