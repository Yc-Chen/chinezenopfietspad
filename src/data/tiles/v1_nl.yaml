  title: Paracetamol geneest alles
  body: |
    Verdwaald in het doolhof.
    Als je naar de huisarts gaat, stellen ze vaak voor om paracetamol met warm water te nemen, en dan komt het wel goed.
    En vaak ben je al beter voordat je afspraak over 2 weken is.
    Terug naar vakje 39.

