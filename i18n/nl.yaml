  other: "Als Chinees voel ik me zo bijzonder dat ik de enige nationaliteit ben die in dit boek wordt aangesproken, dus besloot ik een spel-terug-klap te maken. Dit spel is niet bedoeld om iemand te beledigen, maar wil meer bewustzijn creëren over de systematische discriminatie tegen Chinese en andere Aziatische mensen in Nederland en daarbuiten."
