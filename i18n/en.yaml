overlay_body:
  other: "As a Chinese, I feel so special to be the only nationality addressed in this book, so I decided to create a game-punch-back for it. This game means no offense to anyone, but aims to bring more awareness for the systemic discrimination against Chinese and other Asian people in The Netherlands and beyond."
